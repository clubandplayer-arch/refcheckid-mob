name: RefCheckID CI

on:
  push:
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install backend dependencies
        run: pnpm -C refcheckid-backend install --frozen-lockfile
      - name: Install frontend dependencies
        run: pnpm -C refcheckid-web install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Unit tests
        run: pnpm test:unit
      - name: Integration tests
        run: pnpm test:integration
      - name: End-to-end tests
        run: pnpm test:e2e
      - name: Regression suite
        run: pnpm test:regression
      - name: Security tests
        run: pnpm test:security
      - name: Build
        run: pnpm build
      - name: Coverage
        run: pnpm coverage
      - name: Smoke test
        run: pnpm smoke
